# Server vs GitHub — difference report only. Never deploys or changes the server.
#
# When it runs:
#   • Schedule — weekly (UTC); edit or remove the `cron` line if unwanted.
#   • Manual — Actions → Server drift report → Run workflow.
# (Push to main triggers Deploy production only, not this workflow, to avoid double SSH.)

name: Server drift report

on:
  workflow_dispatch:
  schedule:
    # Mondays 09:00 UTC — drift snapshot without a deploy
    - cron: '0 9 * * 1'

concurrency:
  group: server-drift
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve SSH port
        id: flags
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: echo "ssh_port=${DEPLOY_PORT:-22}" >> "$GITHUB_OUTPUT"

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ steps.flags.outputs.ssh_port }}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Drift report (read-only, no deploy)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ steps.flags.outputs.ssh_port }}
          # If true, drone-ssh stops on first non-zero exit (e.g. `read` can return 1) and skips the rest of the report.
          script_stop: false
          script: |
            # Full script runs as one unit; avoid per-command stop. No -e / pipefail.
            set +e
            set +o pipefail 2>/dev/null || true
            set -u
            DEPLOY_DIR=/www/playlist.nivessa.com/app
            DEPLOY_BRANCH=main
            export DEPLOY_GIT_REMOTE='${{ vars.DEPLOY_GIT_REMOTE }}'
            cd "$DEPLOY_DIR" || { echo "Cannot cd to $DEPLOY_DIR"; exit 1; }
            if [ ! -d .git ]; then
              echo "Not a git repository: $DEPLOY_DIR"
              exit 1
            fi
            if [ -n "${DEPLOY_GIT_REMOTE:-}" ] && git remote get-url "${DEPLOY_GIT_REMOTE}" >/dev/null 2>&1; then
              GIT_REMOTE="${DEPLOY_GIT_REMOTE}"
            elif git remote get-url origin >/dev/null 2>&1; then
              GIT_REMOTE=origin
            elif git remote get-url erp >/dev/null 2>&1; then
              GIT_REMOTE=erp
            else
              echo "No usable remote (origin/erp). Remotes:"
              git remote -v
              exit 1
            fi
            REF_REMOTE="${GIT_REMOTE}/${DEPLOY_BRANCH}"
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"
            ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
            git fetch "$GIT_REMOTE" "$DEPLOY_BRANCH" --prune 2>&1 || { echo "git fetch failed"; exit 1; }
            echo ""
            echo "========== SERVER vs GITHUB (drift report — read-only) =========="
            echo "Time (UTC): $(date -u)"
            echo "Directory:  $DEPLOY_DIR"
            echo "Remote:     $GIT_REMOTE  →  $(git remote get-url "$GIT_REMOTE")"
            echo "Branch:     $DEPLOY_BRANCH"
            echo "Local HEAD: $(git rev-parse --short HEAD)  $(git log -1 --oneline)"
            echo "Remote ref: $(git rev-parse --short "$REF_REMOTE" 2>/dev/null || echo '(missing after fetch)')"
            echo ""
            LR=$(git rev-list --left-right --count "HEAD...${REF_REMOTE}" 2>/dev/null || echo "0 0")
            COUNT_SERVER=$(echo "$LR" | awk '{print $1}')
            COUNT_GITHUB=$(echo "$LR" | awk '{print $2}')
            COUNT_SERVER=${COUNT_SERVER:-0}
            COUNT_GITHUB=${COUNT_GITHUB:-0}
            echo "Commits on SERVER not on GitHub: $COUNT_SERVER"
            echo "Commits on GitHub not on SERVER:  $COUNT_GITHUB"
            echo ""
            DIRTY="$(git status --porcelain 2>/dev/null || true)"
            if [ -n "$DIRTY" ]; then
              echo "--- Uncommitted / local changes ---"
              git status --short
              echo ""
            else
              echo "Working tree: clean"
              echo ""
            fi
            echo "--- Diff vs ${REF_REMOTE} (tree vs tree) ---"
            if git rev-parse "$REF_REMOTE" >/dev/null 2>&1; then
              git diff --stat HEAD "${REF_REMOTE}" 2>/dev/null || true
              echo ""
              echo "--- File list (max 200 lines) ---"
              git diff --name-only HEAD "${REF_REMOTE}" 2>/dev/null | head -200 || true
            else
              echo "(cannot diff — remote ref missing)"
            fi
            echo ""
            echo "========== Summary (informational only) =========="
            ISSUES=0
            if [ -n "$DIRTY" ]; then ISSUES=1; fi
            if [ "${COUNT_SERVER:-0}" -gt 0 ]; then ISSUES=1; fi
            if git rev-parse "$REF_REMOTE" >/dev/null 2>&1; then
              if ! git merge-base --is-ancestor HEAD "$REF_REMOTE" 2>/dev/null; then
                ISSUES=1
              fi
            fi
            if [ "$ISSUES" -eq 0 ]; then
              echo "OK for a typical fast-forward sync (review diffs above anyway)."
            else
              echo "ATTENTION: dirty tree, server-only commits, or non-FF history — review above."
            fi
            echo "=================================================="
            exit 0
