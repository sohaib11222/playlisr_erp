# Deploy to production over SSH on every push to `main`, or manually with optional migrate.
# No Composer — git sync, optional migrate, `php artisan optimize:clear`, queue restart (see scripts/deploy.sh).
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — server hostname or IP
#   DEPLOY_USER       — SSH user (e.g. playlist)
#   DEPLOY_SSH_KEY    — private key (full PEM, begin/end lines included)
# Optional secret:
#   DEPLOY_PORT       — SSH port (omit for 22)
# Optional repository variables (Settings → Variables → Actions):
#   DEPLOY_GIT_REMOTE — git remote name if not "origin" (e.g. erp). If unset, server uses origin, then erp.
#   DEPLOY_SYNC_MODE  — ff-only (default) or reset. Bootstrap (no scripts/deploy.sh yet) always uses reset --hard.

name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrate:
        description: Run php artisan migrate --force on server
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve migrate flag and SSH port
        id: flags
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          # inputs come through as strings even when declared type: boolean,
          # so the old `== true` comparison silently always evaluated false —
          # meaning the "Run migrate" checkbox on workflow_dispatch did nothing.
          echo "run_migrate=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrate == 'true' && 1 || 0 }}" >> "$GITHUB_OUTPUT"
          echo "ssh_port=${DEPLOY_PORT:-22}" >> "$GITHUB_OUTPUT"

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ steps.flags.outputs.ssh_port }}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ steps.flags.outputs.ssh_port }}
          script_stop: true
          script: |
            set -e
            DEPLOY_PATH=/www/playlist.nivessa.com/app
            export DEPLOY_DIR="$DEPLOY_PATH"
            export DEPLOY_BRANCH=main
            export DEPLOY_MIGRATE='${{ steps.flags.outputs.run_migrate }}'
            export DEPLOY_GIT_REMOTE='${{ vars.DEPLOY_GIT_REMOTE }}'
            export DEPLOY_SYNC_MODE='${{ vars.DEPLOY_SYNC_MODE }}'
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"
            ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
            cd "$DEPLOY_PATH"
            if [ -n "${DEPLOY_GIT_REMOTE:-}" ] && git remote get-url "${DEPLOY_GIT_REMOTE}" >/dev/null 2>&1; then
              R="${DEPLOY_GIT_REMOTE}"
            elif git remote get-url origin >/dev/null 2>&1; then
              R=origin
            elif git remote get-url erp >/dev/null 2>&1; then
              R=erp
            else
              echo "No git remote 'origin' or 'erp'. Set repo variable DEPLOY_GIT_REMOTE or on server run: git remote -v"
              git remote -v
              exit 1
            fi
            export DEPLOY_GIT_REMOTE="$R"
            echo "Using git remote: $R"
            if [ ! -f "$DEPLOY_PATH/scripts/deploy.sh" ]; then
              echo "Bootstrap: scripts/deploy.sh missing — aligning server to $R/main (git reset --hard) so deploy scripts exist."
              echo "Tracked files match GitHub; gitignored files (e.g. .env) are not removed."
              git fetch "$R" main
              git reset --hard "$R/main"
            fi
            bash "$DEPLOY_PATH/scripts/deploy.sh"
